<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layoutBase(contenido)">

<head>
    <title>SERFAGAB</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 + FontAwesome 6 + SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- DataTables (solo si se usa en todas las páginas, si no, cargar solo donde se necesite) -->
    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.2/css/dataTables.bootstrap5.css">
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/2.3.2/js/dataTables.js"></script>
    <script src="https://cdn.datatables.net/2.3.2/js/dataTables.bootstrap5.js"></script>

    <!-- CSS propio -->
    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>

<body>
    <header class="header">
        <div class="container d-flex justify-content-between align-items-center py-2">
            <div class="btn-menu">
                <label for="btn-menu"><i class="fa-solid fa-bars"></i></label>
            </div>
            <div class="text-white">
                <h1 class="h5 m-0">SERFAGAB - Bienvenido, <span th:text="${session.fullName}"></span></h1>
            </div>
        </div>
    </header>

    <input type="checkbox" id="btn-menu">

    <div class="container-menu">
        <div class="cont-menu">
            <nav>
                <a th:href="@{/dashboard}"><i class="fa-solid fa-house"></i> Inicio</a>
                <a th:href="@{/proveedor/listado}"><i class="fa-solid fa-truck"></i> Proveedores</a>
                <a th:href="@{/tipomaterial/listado}"><i class="fa-solid fa-tags"></i> Tipo Material</a>
                <a th:href="@{/material/listado}"><i class="fa-solid fa-boxes-stacked"></i> Materiales</a>
                <a th:href="@{/ordencompra/nuevo}"><i class="fa-solid fa-cart-plus"></i> Registrar OC</a>
                <a th:href="@{/ordencompra/listado}"><i class="fa-solid fa-file-lines"></i> Consulta OC</a>
                <a href="#" id="cerrarSesionLink"><i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión</a>
            </nav>
            <label for="btn-menu"><i class="fa-solid fa-xmark"></i></label>
        </div>
    </div>

    <main style="padding: 70px 15px;">
        <div class="container mt-5 pt-3" th:replace="${contenido}">[Contenido aquí]</div>
    </main>

    <script>
        // Cerrar sesión con SweetAlert
        document.getElementById("cerrarSesionLink").addEventListener("click", function (e) {
            e.preventDefault();
            Swal.fire({
                title: "¿Deseas cerrar sesión?",
                icon: "question",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, cerrar",
                cancelButtonText: "No"
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = "/";
                }
            });
        });
    </script>
</body>
</html>
