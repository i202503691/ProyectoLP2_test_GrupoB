<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>SERFAGAB - Inicio de Sesión</title>
    
    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
    <!-- Font Awesome 6 (actualizado) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Tu CSS personalizado (se respeta) -->
    <link rel="stylesheet" th:href="@{/css/login.css}">
    
    <!-- Estilos adicionales inline para no tocar el login.css original -->
    <style>
        /* Mejoras sutiles sin romper el login.css */
        .box-login {
            max-width: 450px;
            margin: 0 auto;
            animation: fadeInUp 0.8s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card {
            border-radius: 20px;
            overflow: hidden;
            border: none;
        }
        .card-header {
            background: linear-gradient(135deg, #1a1a2e, #16213e) !important;
            padding: 1.5rem;
        }
        .card-header h3 {
            font-weight: 700;
            letter-spacing: 2px;
        }
        .card-body {
            padding: 2rem 1.5rem;
        }
        .btn-dark {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: none;
            padding: 0.75rem;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-dark:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .btn-dark:active {
            transform: scale(0.98);
        }
        .input-group-text {
            background-color: #f8f9fa;
            border-right: none;
        }
        .form-control {
            border-left: none;
        }
        .form-control:focus {
            border-color: #16213e;
            box-shadow: 0 0 0 0.2rem rgba(22, 33, 62, 0.25);
        }
        .card-footer {
            background: #f8f9fa;
            font-size: 0.9rem;
        }
        /* Spinner en el botón */
        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
            border-width: 0.15em;
        }
        /* Ocultar spinner por defecto */
        #btn-spinner {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="box-login">

                <div class="card shadow-lg">
                    <div class="card-header text-center text-white">
                        <h3><i class="fas fa-cubes me-2"></i>SERFAGAB</h3>
                        <small class="opacity-75">Sistema de Gestión de Compras</small>
                    </div>

                    <div class="card-body">
                        <h5 class="text-center mb-4">
                            <i class="fas fa-sign-in-alt me-2 text-dark"></i>Inicio de Sesión
                        </h5>

                        <!-- IMPORTANTE: Mantengo method="get" para no romper el controlador -->
                        <form th:action="@{/login/iniciar-sesion}" method="get" th:object="${filter}" id="loginForm">

                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    <i class="fas fa-user me-1"></i> Login
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="fa-regular fa-user"></i>
                                    </span>
                                    <input type="text" 
                                           class="form-control" 
                                           placeholder="Ingrese su login" 
                                           th:field="*{login}"
                                           required
                                           autofocus>
                                </div>
                                <div class="invalid-feedback" style="display: none;">
                                    Por favor, ingrese su login.
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">
                                    <i class="fas fa-key me-1"></i> Clave
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="fa-solid fa-key"></i>
                                    </span>
                                    <input type="password" 
                                           class="form-control" 
                                           placeholder="Ingrese su clave" 
                                           th:field="*{clave}"
                                           required>
                                </div>
                                <div class="invalid-feedback" style="display: none;">
                                    Por favor, ingrese su clave.
                                </div>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-dark" id="btnLogin">
                                    <span id="btn-text">
                                        <i class="fas fa-sign-in-alt me-2"></i> INGRESAR
                                    </span>
                                    <span id="btn-spinner">
                                        <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                                        Ingresando...
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>

                    <div class="card-footer text-muted text-center">
                        &copy; 2025 SERFAGAB - Todos los derechos reservados
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Contenedor para mensajes flash (Alert) -->
    <th:block th:utext="${alert}"></th:block>

    <!-- JavaScript para validación y spinner -->
    <script>
        (function() {
            // Mostrar spinner al enviar el formulario
            const form = document.getElementById('loginForm');
            const btn = document.getElementById('btnLogin');
            const textSpan = document.getElementById('btn-text');
            const spinnerSpan = document.getElementById('btn-spinner');

            form.addEventListener('submit', function(e) {
                // Validación simple con HTML5 (required)
                const login = form.querySelector('[name="login"]');
                const clave = form.querySelector('[name="clave"]');
                let valid = true;

                if (!login.value.trim()) {
                    login.classList.add('is-invalid');
                    login.nextElementSibling.style.display = 'block';
                    valid = false;
                } else {
                    login.classList.remove('is-invalid');
                    login.nextElementSibling.style.display = 'none';
                }

                if (!clave.value.trim()) {
                    clave.classList.add('is-invalid');
                    clave.nextElementSibling.style.display = 'block';
                    valid = false;
                } else {
                    clave.classList.remove('is-invalid');
                    clave.nextElementSibling.style.display = 'none';
                }

                if (!valid) {
                    e.preventDefault();
                    return false;
                }

                // Si todo ok, mostrar spinner
                textSpan.style.display = 'none';
                spinnerSpan.style.display = 'inline-block';
                btn.disabled = true;
            });

            // Limpiar validación al escribir
            document.querySelectorAll('.form-control').forEach(input => {
                input.addEventListener('input', function() {
                    this.classList.remove('is-invalid');
                    if (this.nextElementSibling && this.nextElementSibling.classList.contains('invalid-feedback')) {
                        this.nextElementSibling.style.display = 'none';
                    }
                });
            });
        })();
    </script>
</body>

</html>
