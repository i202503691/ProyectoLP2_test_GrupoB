<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: layoutBase(~{::contenido})">
<div th:fragment="contenido">
    <div class="container mt-5">
        <div class="card shadow-lg">
            <div class="card-body">
                <h1 class="card-title text-center" th:text="|Proveedor Edicion - Id ${proveedor.idProveedor}|"></h1>
                <div class="row d-flex justify-content-center">
                    <div class="col-md-6">
                        <form th:action="@{/proveedor/guardar}" th:object="${proveedor}" class="row g-2" method="post" novalidate>
                            <input type="hidden" th:field="*{idProveedor}">
                            <div class="col-md-12">
                                <label for="razonSocial" class="form-label">Razon Social</label>
                                <input type="text" class="form-control" th:field="*{razonSocial}" placeholder="Ingrese razon social" required>
                            </div>
                            <div class="col-md-6">
                                <label for="ruc" class="form-label">RUC</label>
                                <input type="text" class="form-control" th:field="*{ruc}" placeholder="12345678901" maxlength="11" required>
                            </div>
                            <div class="col-md-6">
                                <label for="celular" class="form-label">Celular</label>
                                <input type="text" class="form-control" th:field="*{celular}" placeholder="999888777">
                            </div>
                            <div class="col-md-12">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" th:field="*{email}" placeholder="correo@empresa.com">
                            </div>
                            <div class="col-md-12">
                                <label for="descripcion" class="form-label">Descripcion</label>
                                <textarea class="form-control" th:field="*{descripcion}" rows="3" placeholder="Descripcion del proveedor"></textarea>
                            </div>
                            <input type="hidden" th:field="*{activo}">
                            <div class="col-md-12 d-flex justify-content-between">
                                <a th:href="@{/proveedor/listado}" class="btn btn-outline-dark">
                                    <i class="fa-solid fa-reply"></i> Regresar
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fa-solid fa-floppy-disk"></i> Guardar
                                </button>
                                <button type="reset" class="btn btn-secondary">
                                    <i class="fa-solid fa-broom"></i> Limpiar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <th:block th:utext="${alert}"></th:block>
</div>
</html>
